name: refactor
version: "1.0.0"
description: Code refactoring assistant

trigger:
  - /refactor

prompt: |
  Refactor the provided code to improve:
  - Readability and clarity
  - Reusability and modularity
  - Adherence to project conventions
  - TypeScript type safety

  Preserve existing behavior. Show a diff of the changes with explanations.

tools:
  - read
  - edit

adapters:
  cursor:
    alwaysApply: false
  claude-code:
    type: skill
