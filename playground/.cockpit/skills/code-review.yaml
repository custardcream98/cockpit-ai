name: code-review
version: "1.0.0"
description: Comprehensive code review

trigger:
  - /review

prompt: |
  Review the provided code for:
  - Bugs and logic errors
  - Performance issues and bottlenecks
  - Security vulnerabilities
  - Code style and maintainability

  Provide actionable feedback with specific line references where possible.

tools:
  - read
  - grep

adapters:
  cursor:
    alwaysApply: false
  claude-code:
    type: command
